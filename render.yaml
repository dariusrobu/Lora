services:
  - type: web
    name: lora-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: WEB_DOMAIN
        value: "lora-bot.onrender.com"
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_USER_ID
        sync: false
      - key: TIMEZONE
        value: Europe/Bucharest
      - key: MORNING_BRIEFING_TIME
        value: "08:00"
      - key: EOD_REFLECTION_TIME
        value: "21:00"
      - key: WEEKLY_REVIEW_DAY
        value: "sunday"
      - key: HABIT_REMINDER_TIME
        value: "18:00"
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: WEATHER_CITY
        value: "Bucharest"
      - key: NUTRITIONIX_APP_ID
        sync: false
      - key: NUTRITIONIX_API_KEY
        sync: false
