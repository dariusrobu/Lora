services:
  - type: worker
    name: lora-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: TELEGRAM_USER_ID
        sync: false
      - key: TIMEZONE
        value: Europe/Bucharest
      - key: MORNING_BRIEFING_TIME
        value: "08:00"
      - key: EOD_REFLECTION_TIME
        value: "21:00"
